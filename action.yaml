name: Setup NVGT
description: Download and install NVGT and tools for the current platform.

inputs:
  version:
    description: Version to install. Ignored if latest or dev is true.
    required: false
  latest:
    description: Install the latest version. Ignored if dev is true.
    required: false
    default: "true"
  dev:
    description: Install the bleeding edge development version. Takes president over all else.
    required: false
    default: "false"
  tools:
    description: A newline separated list of tools to install, i.e. nvgtpm.
    required: false
  add_to_path:
    description: Add NVGT to path directory after installation.
    required: false
    default: "true"

outputs:
  path:
    description: Path to the NVGT installed directory.

runs:
  using: node24
  main: dist/index.js

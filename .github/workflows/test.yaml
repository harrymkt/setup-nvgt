name: Test action
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-Windows:
    name: Test on Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup NVGT
        id: engine
        uses: harrymkt/setup-nvgt@main
      - name: Checkout NVGT Outputs
        shell: bash
        run: |
          nvgt -V
          ls ${{ steps.engine.outputs.path }}

  test-Linux:
    name: Test on Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup NVGT
        id: engine
        uses: harrymkt/setup-nvgt@main
      - name: Checkout NVGT Outputs
        shell: bash
        run: |
          nvgt -V
          ls ${{ steps.engine.outputs.path }}

  test-Mac-OS:
    name: Test on Mac OS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup NVGT
        id: engine
        uses: harrymkt/setup-nvgt@main
      - name: Checkout NVGT Outputs
        shell: bash
        run: |
          nvgt -V
          ls ${{ steps.engine.outputs.path }}
